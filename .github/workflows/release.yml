name: release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (v0.1.0 or 0.1.0; must exist on GitHub and match VERSION)"
        required: true
      draft:
        description: "Create as draft release"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.normalize.outputs.tag }}
    steps:
      - name: Normalize tag input
        id: normalize
        run: |
          raw="${{ inputs.tag }}"
          if [[ "$raw" == v* ]]; then
            tag="$raw"
          else
            tag="v$raw"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Using release tag: $tag"
      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.normalize.outputs.tag }}
      - name: Verify tag matches VERSION file
        run: |
          expected="v$(tr -d ' \n\r' < VERSION)"
          tag="${{ steps.normalize.outputs.tag }}"
          if [ "$tag" != "$expected" ]; then
            echo "Tag $tag does not match VERSION file ($expected)"
            exit 1
          fi
          echo "Tag matches VERSION: $expected"

  test:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./... -count=1
      - run: go vet ./...

  build:
    needs:
      - prepare
      - test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: windows-latest
            goos: windows
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install Linux WebView dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev
      - name: Install Make (Windows)
        if: runner.os == 'Windows'
        run: choco install make -y
      - name: Build and package
        shell: bash
        run: make package-ci
      - name: Zip Windows executable
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = (Get-Content VERSION -Raw).Trim()
          $exe = "dist/DbAccounts-v${version}-windows-amd64.exe"
          $zip = "dist/DbAccounts-v${version}-windows-amd64.zip"
          if (-not (Test-Path $exe)) { throw "Missing $exe" }
          Compress-Archive -Path $exe -DestinationPath $zip -Force
          Remove-Item $exe
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  release:
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          draft: ${{ inputs.draft }}
          generate_release_notes: true
          body: |
            ### Installing

            - **macOS:** First launch requires **Right-click → Open** (unsigned build). See [README](https://github.com/michal-bartak/pg-accounts-management#installing-releases).
            - **Windows:** SmartScreen may warn; choose **More info → Run anyway**.
            - **Linux:** Install runtime libs `libgtk-3-0` and `libwebkit2gtk-4.1-0` if needed.
          files: dist/*
